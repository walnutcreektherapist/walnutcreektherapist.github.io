trust_faq:
  q: "How do I know I can trust you?"
  a: "You don't have to force it. If part of you doesn't trust me, that's worth paying attention to rather than pushing past — closing the gap between us is my job, not yours, and it's genuinely okay if we turn out not to be the right fit. There's more on <a href='/about/#trust'>my About page</a>, including why some wariness toward a therapist can be perfectly reasonable."

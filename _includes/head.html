<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.ico">
<title>{{ page.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="canonical" href="{{ site.url }}{{ page.url }}">
<meta property="og:type" content="website">
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta property="og:locale" content="en_US">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@graph":[
    {
      "@type":"MedicalBusiness",
      "@id":"{{ site.url }}/#practice",
      "name":"{{ site.title }} — {{ site.therapist_name }}, {{ site.credential }}",
      "url":"{{ site.url }}/",
      "telephone":"{{ site.phone_e164 }}",
      "priceRange":"$$",
      "medicalSpecialty":"Psychiatric",
      "description":{{ site.description | jsonify }},
      "address":{"@type":"PostalAddress","streetAddress":"{{ site.address.street }}","addressLocality":"{{ site.address.city }}","addressRegion":"{{ site.address.region }}","postalCode":"{{ site.address.zip }}","addressCountry":"US"},
      "areaServed":[{"@type":"City","name":"Walnut Creek"},{"@type":"City","name":"Lafayette"},{"@type":"City","name":"Pleasant Hill"},{"@type":"City","name":"Concord"},{"@type":"City","name":"Danville"},{"@type":"State","name":"California"}],
      "founder":{"@id":"{{ site.url }}/#person"},
      "employee":{"@id":"{{ site.url }}/#person"}
    },
    {
      "@type":"Person",
      "@id":"{{ site.url }}/#person",
      "name":"{{ site.therapist_name }}",
      "honorificSuffix":"{{ site.credential }}",
      "jobTitle":"Licensed Marriage and Family Therapist",
      "url":"{{ site.url }}/",
      "worksFor":{"@id":"{{ site.url }}/#practice"},
      "alumniOf":"New College of California",
      "knowsAbout":["Couples therapy","Gottman Method couples therapy","EMDR therapy","Flash technique","Cognitive behavioral therapy","Adult ADHD","PTSD treatment","Anxiety treatment","Affair and betrayal recovery","Feedback-informed treatment","Measurement-based care"],
      "sameAs":[{% for s in site.same_as %}{{ s | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}]
    }
  ]
}
</script>
{% if page.faqs %}
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{% for f in page.faqs %}{"@type":"Question","name":{{ f.q | jsonify }},"acceptedAnswer":{"@type":"Answer","text":{{ f.a | jsonify }}}}{% unless forloop.last %},{% endunless %}{% endfor %}]}
</script>
{% endif %}

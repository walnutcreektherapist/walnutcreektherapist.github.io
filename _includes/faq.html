{% if page.faqs %}
<div class="faq">
{% for f in page.faqs %}<details{% if forloop.first %} open{% endif %}><summary>{{ f.q }}</summary><div class="answer">{{ f.a }}</div></details>
{% endfor %}<details><summary>{{ site.trust_faq.q }}</summary><div class="answer">{{ site.trust_faq.a }}</div></details>
</div>
{% endif %}

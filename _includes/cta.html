<div class="contact-card">
  <p class="eyebrow light">Get started</p>
  <h2>Reach out when you're ready</h2>
  <div class="contact-rows">
    <div><div class="label">Office</div>{{ site.address.street }}<br>{{ site.address.city }}, {{ site.address.region }} {{ site.address.zip }}</div>
    <div><div class="label">Phone</div><a href="tel:{{ site.phone_e164 }}">{{ site.phone }}</a></div>
    <div><div class="label">Sessions</div>Couples in person · individuals in person or video</div>
  </div>
  <a class="btn btn-primary" href="{{ site.booking_url }}" target="_blank" rel="noopener">Book a free consultation</a>
</div>
